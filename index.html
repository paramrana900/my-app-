<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Study Planner</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="StudyPlan">
<meta name="theme-color" content="#7c6af7">
<meta name="description" content="Track subjects, run study timers, set alarms and visualise progress.">

<!-- Apple Touch Icons -->
<link rel="apple-touch-icon" href="icons/icon-152x152.png">
<link rel="apple-touch-icon" sizes="144x144" href="icons/icon-144x144.png">
<link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192x192.png">

<!-- Favicon -->
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">
<link rel="icon" type="image/png" sizes="96x96"   href="icons/icon-96x96.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: #2e2e3e;
    --accent: #7c6af7;
    --accent2: #f97066;
    --green: #34d399;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: 80px;
  }
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 20px 14px;
    position: sticky; top: 0; z-index: 10;
  }
  .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
  .app-title { font-family: var(--mono); font-size: 12px; color: var(--accent); letter-spacing: 0.08em; }
  .clock { font-family: var(--mono); font-size: 22px; font-weight: 500; }
  .date-str { font-size: 12px; color: var(--muted); }

  .tabs {
    display: flex;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 78px; z-index: 9;
    padding: 0 20px;
  }
  .tab-btn {
    flex: 1; padding: 11px 0;
    background: none; border: none; border-bottom: 2px solid transparent;
    color: var(--muted); font-family: var(--sans); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.15s;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  .section { display: none; padding: 16px 20px; }
  .section.active { display: block; }

  .section-label {
    font-size: 10px; font-family: var(--mono); color: var(--muted);
    letter-spacing: 0.1em; text-transform: uppercase;
    margin: 14px 0 10px;
  }
  .section-label:first-child { margin-top: 4px; }

  /* ── ALARM ── */
  .alarm-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px; margin-bottom: 9px;
    display: flex; align-items: center; gap: 14px;
  }
  .alarm-time-big { font-family: var(--mono); font-size: 22px; font-weight: 500; min-width: 64px; }
  .alarm-info { flex: 1; min-width: 0; }
  .alarm-label-text { font-size: 13px; font-weight: 500; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .alarm-days { font-size: 11px; color: var(--muted); font-family: var(--mono); }

  .toggle-switch { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; inset: 0; background: var(--border); border-radius: 24px; cursor: pointer; transition: background 0.2s; }
  .slider::before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: transform 0.2s; }
  .toggle-switch input:checked + .slider { background: var(--accent); }
  .toggle-switch input:checked + .slider::before { transform: translateX(20px); }

  .del-btn { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; padding: 2px 4px; line-height: 1; flex-shrink: 0; }

  .add-form {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px; margin-bottom: 4px;
  }
  .add-form input, .add-form select {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: var(--sans);
    font-size: 14px; padding: 10px 12px; margin-bottom: 9px;
    outline: none; -webkit-appearance: none;
  }
  .add-form input:focus, .add-form select:focus { border-color: var(--accent); }
  .form-row { display: flex; gap: 8px; margin-bottom: 9px; }
  .form-row input, .form-row select { margin-bottom: 0; }
  .btn-add {
    width: 100%; padding: 11px; background: var(--accent);
    border: none; border-radius: 8px; color: #fff;
    font-family: var(--sans); font-size: 14px; font-weight: 600;
    cursor: pointer; transition: opacity 0.2s;
  }
  .btn-add:active { opacity: 0.8; }

  /* ── ALARM OVERLAY ── */
  .alarm-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.9); z-index: 100;
    align-items: center; justify-content: center;
    flex-direction: column; text-align: center; padding: 40px 30px;
  }
  .alarm-overlay.show { display: flex; }
  .ring-icon { font-size: 64px; margin-bottom: 16px; animation: shake 0.45s infinite; }
  @keyframes shake { 0%,100%{transform:rotate(-12deg)} 50%{transform:rotate(12deg)} }
  .ring-time { font-family: var(--mono); font-size: 52px; font-weight: 500; color: var(--accent); margin-bottom: 6px; }
  .ring-label-text { font-size: 17px; color: var(--text); margin-bottom: 36px; }
  .ring-dismiss {
    background: var(--accent2); border: none; border-radius: 50px;
    color: white; font-size: 16px; font-weight: 600;
    padding: 14px 44px; cursor: pointer; font-family: var(--sans);
  }
  .snooze-btn {
    background: none; border: 1px solid var(--border); border-radius: 50px;
    color: var(--muted); font-size: 14px; padding: 10px 32px;
    cursor: pointer; font-family: var(--sans); margin-top: 12px;
  }

  /* ── SUBJECT TIMER ── */
  .subject-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 16px; margin-bottom: 10px;
  }
  .subject-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
  }
  .subject-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .subject-name-input {
    flex: 1; background: transparent; border: none; border-bottom: 1px solid var(--border);
    color: var(--text); font-family: var(--sans); font-size: 14px; font-weight: 500;
    padding: 2px 4px; outline: none;
  }
  .subject-name-input:focus { border-bottom-color: var(--accent); }
  .subject-del { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 0 2px; line-height: 1; }
  .timer-display {
    font-family: var(--mono); font-size: 26px; font-weight: 500;
    text-align: center; letter-spacing: 0.03em; margin-bottom: 10px;
    color: var(--text);
  }
  .timer-display.running { color: var(--green); }
  .timer-controls { display: flex; gap: 8px; }
  .timer-btn {
    flex: 1; padding: 9px 0; border: none; border-radius: 8px;
    font-family: var(--sans); font-size: 13px; font-weight: 600;
    cursor: pointer; transition: opacity 0.2s;
  }
  .timer-btn:active { opacity: 0.75; }
  .btn-start { background: var(--accent); color: #fff; }
  .btn-pause { background: var(--accent2); color: #fff; }
  .btn-reset { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .add-subject-form {
    background: var(--surface); border: 1px dashed var(--border);
    border-radius: 14px; padding: 14px 16px; margin-bottom: 10px;
    display: flex; gap: 8px;
  }
  .add-subject-form input {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: var(--sans);
    font-size: 14px; padding: 9px 12px; outline: none;
  }
  .add-subject-form input:focus { border-color: var(--accent); }
  .btn-add-sub {
    padding: 9px 16px; background: var(--accent); border: none;
    border-radius: 8px; color: #fff; font-family: var(--sans);
    font-size: 14px; font-weight: 600; cursor: pointer;
  }

  /* ── GRAPH ── */
  .graph-wrap {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px; margin-bottom: 12px;
  }
  .graph-title {
    font-size: 11px; font-family: var(--mono); color: var(--muted);
    letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 14px;
  }
  .bar-row {
    display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
  }
  .bar-label {
    font-size: 12px; color: var(--text); font-weight: 500;
    width: 90px; flex-shrink: 0; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  .bar-track {
    flex: 1; height: 20px; background: var(--bg);
    border-radius: 6px; overflow: hidden; position: relative;
  }
  .bar-fill {
    height: 100%; border-radius: 6px;
    transition: width 1s ease; min-width: 0;
  }
  .bar-val {
    font-family: var(--mono); font-size: 11px; color: var(--muted);
    width: 52px; text-align: right; flex-shrink: 0;
  }
  .graph-empty {
    text-align: center; color: var(--muted); font-size: 13px; padding: 24px 0;
  }
  .donut-wrap {
    display: flex; justify-content: center; align-items: center;
    margin: 10px 0 4px; flex-direction: column; gap: 12px;
  }
  .legend-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 6px 16px; width: 100%; margin-top: 4px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--muted);
  }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .graph-total {
    text-align: center; font-family: var(--mono); font-size: 11px;
    color: var(--muted); margin-top: 6px;
  }

  /* TOAST */
  .toast {
    position: fixed; bottom: 90px; left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 18px; font-size: 13px; color: var(--text);
    opacity: 0; transition: all 0.25s; pointer-events: none;
    white-space: nowrap; z-index: 50;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  select option { background: #1a1a22; }

  .running-badge {
    display: inline-block; font-size: 9px; font-family: var(--mono);
    color: var(--green); border: 1px solid var(--green);
    border-radius: 4px; padding: 1px 5px; margin-left: 6px;
    animation: pulse 2s infinite; vertical-align: middle;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="app-title">STUDY_PLANNER</div>
    <div class="clock" id="clock">00:00</div>
  </div>
  <div class="date-str" id="datestr"></div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('timer',this)">Subjects</button>
  <button class="tab-btn" onclick="showTab('graph',this)">Progress</button>
  <button class="tab-btn" onclick="showTab('alarms',this)">Alarms</button>
</div>

<!-- SUBJECTS / TIMER -->
<div class="section active" id="tab-timer">
  <div class="section-label">Add subject</div>
  <div class="add-subject-form">
    <input type="text" id="sub-name-input" placeholder="Subject name…" maxlength="32">
    <button class="btn-add-sub" onclick="addSubject()">+ Add</button>
  </div>
  <div class="section-label">Timers — only one can run at a time</div>
  <div id="subject-list"></div>
</div>

<!-- PROGRESS GRAPH -->
<div class="section" id="tab-graph">
  <div class="section-label">Today's study time</div>
  <div class="graph-wrap">
    <div class="graph-title">Time per subject</div>
    <div id="bar-chart"></div>
  </div>
  <div class="graph-wrap">
    <div class="graph-title">Distribution</div>
    <div class="donut-wrap">
      <canvas id="donut-canvas" width="160" height="160"></canvas>
      <div class="legend-grid" id="donut-legend"></div>
    </div>
    <div class="graph-total" id="graph-total">Total: 0h 00m</div>
  </div>
  <button onclick="resetAllProgress()" style="
    width:100%; padding:12px; background:none;
    border:1px solid var(--accent2); border-radius:10px;
    color:var(--accent2); font-family:var(--sans); font-size:13px;
    font-weight:600; cursor:pointer; margin-top:4px; letter-spacing:0.02em;
  ">↺ Reset All Progress</button>
</div>

<!-- ALARMS -->
<div class="section" id="tab-alarms">
  <div class="section-label">Set new alarm</div>
  <div class="add-form">
    <input type="time" id="alarm-time-input">
    <input type="text" id="alarm-label-input" placeholder="Label (e.g. Morning QA session)" maxlength="40">
    <select id="alarm-days-input">
      <option value="Daily">Every day</option>
      <option value="Mon–Fri">Weekdays only</option>
      <option value="Weekends">Weekends only</option>
      <option value="Once">Once</option>
    </select>
    <button class="btn-add" onclick="addAlarm()" style="margin-top:2px">+ Set alarm</button>
  </div>
  <div class="section-label">Active alarms</div>
  <div id="alarm-list"></div>
</div>

<!-- Ringing overlay -->
<div class="alarm-overlay" id="alarm-overlay">
  <div class="ring-icon">🔔</div>
  <div class="ring-time" id="ring-time">06:00</div>
  <div class="ring-label-text" id="ring-label">Study alarm</div>
  <button class="ring-dismiss" onclick="dismissAlarm()">Dismiss</button>
  <button class="snooze-btn" onclick="snoozeAlarm()">Snooze 5 min</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ── PALETTE ──────────────────────────────────────────────────
const COLORS = [
  '#7c6af7','#f97066','#34d399','#fbbf24','#60a5fa',
  '#e879f9','#fb923c','#4ade80','#a78bfa','#f472b6'
];

// ── STATE ─────────────────────────────────────────────────────
function uid(){ return Math.random().toString(36).slice(2,9); }

let subjects = JSON.parse(localStorage.getItem('spt_subjects') || 'null');
let alarms   = JSON.parse(localStorage.getItem('sp2_alarms')  || 'null');

if (!subjects) {
  subjects = [
    { id: uid(), name: 'QA / Maths',      color: COLORS[0], seconds: 0, totalSeconds: 0 },
    { id: uid(), name: 'Reasoning',        color: COLORS[1], seconds: 0, totalSeconds: 0 },
    { id: uid(), name: 'English',          color: COLORS[2], seconds: 0, totalSeconds: 0 },
    { id: uid(), name: 'General Awareness',color: COLORS[3], seconds: 0, totalSeconds: 0 },
  ];
  saveSubjects();
} else {
  // migrate old data that lacks totalSeconds
  subjects.forEach(s => { if (s.totalSeconds == null) s.totalSeconds = s.seconds; });
}
if (!alarms) {
  alarms = [
    {id:uid(),time:'06:30',label:'Wake up & morning study',days:'Daily',on:true},
    {id:uid(),time:'13:00',label:'Afternoon session start',days:'Daily',on:true},
    {id:uid(),time:'20:00',label:'Evening mock / revision',days:'Mon–Fri',on:true},
  ];
  saveAlarms();
}

function saveSubjects(){ localStorage.setItem('spt_subjects', JSON.stringify(subjects)); }
function saveAlarms()  { localStorage.setItem('sp2_alarms',  JSON.stringify(alarms));   }

// ── RUNNING TIMER ──────────────────────────────────────────────
let runningId  = null;   // subject id currently ticking
let timerTick  = null;   // setInterval handle

function startTimer(id){
  if (runningId && runningId !== id) pauseTimer(runningId);
  runningId = id;
  if (timerTick) clearInterval(timerTick);
  timerTick = setInterval(() => {
    const s = subjects.find(x => x.id === id);
    if (!s) { clearInterval(timerTick); return; }
    s.seconds++;
    s.totalSeconds = (s.totalSeconds || 0) + 1; // permanent — never reset by timer
    saveSubjects();
    updateTimerDisplay(id);
    renderGraph(); // live graph update
  }, 1000);
  renderSubjects();
}

function pauseTimer(id){
  if (runningId === id) {
    clearInterval(timerTick);
    timerTick  = null;
    runningId  = null;
  }
  renderSubjects();
}

function resetTimer(id){
  if (runningId === id) { clearInterval(timerTick); timerTick = null; runningId = null; }
  const s = subjects.find(x => x.id === id);
  if (s){ s.seconds = 0; saveSubjects(); } // totalSeconds untouched
  renderSubjects();
  // graph NOT re-rendered — progress is permanent
}

function updateTimerDisplay(id){
  const el = document.getElementById('td-' + id);
  if (!el) return;
  const s = subjects.find(x => x.id === id);
  if (s) el.textContent = fmt(s.seconds);
}

function fmt(sec){
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  return String(h).padStart(2,'0') + 'h ' +
    String(m).padStart(2,'0') + 'm ' +
    String(s).padStart(2,'0') + 's';
}
function fmtShort(sec){
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  if (h) return h+'h '+String(m).padStart(2,'0')+'m';
  if (m) return m+'m '+String(s).padStart(2,'0')+'s';
  return s+'s';
}

// ── RENDER SUBJECTS ────────────────────────────────────────────
function renderSubjects(){
  const el = document.getElementById('subject-list');
  if (!subjects.length){
    el.innerHTML = '<div style="text-align:center;color:var(--muted);padding:32px 0;font-size:13px;">No subjects yet. Add one above.</div>';
    return;
  }
  el.innerHTML = subjects.map(s => {
    const isRunning = runningId === s.id;
    return `<div class="subject-card" id="sc-${s.id}">
      <div class="subject-header">
        <div class="subject-dot" style="background:${s.color}"></div>
        <input class="subject-name-input" value="${esc(s.name)}"
          onchange="renameSubject('${s.id}',this.value)"
          oninput="renameSubject('${s.id}',this.value)">
        ${isRunning ? '<span class="running-badge">LIVE</span>' : ''}
        <button class="subject-del" onclick="deleteSubject('${s.id}')">×</button>
      </div>
      <div class="timer-display ${isRunning?'running':''}" id="td-${s.id}">${fmt(s.seconds)}</div>
      <div class="timer-controls">
        ${isRunning
          ? `<button class="timer-btn btn-pause" onclick="pauseTimer('${s.id}')">⏸ Pause</button>`
          : `<button class="timer-btn btn-start" onclick="startTimer('${s.id}')">▶ Start</button>`
        }
        <button class="timer-btn btn-reset" onclick="resetTimer('${s.id}')">↺ Reset</button>
      </div>
    </div>`;
  }).join('');
}

function esc(str){ return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

function renameSubject(id, val){
  const s = subjects.find(x => x.id === id);
  if (s){ s.name = val.trim() || s.name; saveSubjects(); renderGraph(); }
}

function addSubject(){
  const inp = document.getElementById('sub-name-input');
  const name = inp.value.trim();
  if (!name){ showToast('Enter a subject name'); return; }
  const color = COLORS[subjects.length % COLORS.length];
  subjects.push({ id: uid(), name, color, seconds: 0, totalSeconds: 0 });
  saveSubjects();
  inp.value = '';
  renderSubjects();
  renderGraph();
  showToast('Subject added!');
}

function deleteSubject(id){
  if (runningId === id){ clearInterval(timerTick); timerTick = null; runningId = null; }
  subjects = subjects.filter(x => x.id !== id);
  saveSubjects();
  renderSubjects();
  renderGraph();
}

// ── RESET PROGRESS (graph tab only) ───────────────────────────
function resetAllProgress(){
  if (!confirm('Reset all study progress? This cannot be undone.')) return;
  subjects.forEach(s => { s.totalSeconds = 0; });
  saveSubjects();
  renderGraph();
  showToast('Progress reset');
}

// ── GRAPH ──────────────────────────────────────────────────────
function renderGraph(){
  renderBarChart();
  renderDonut();
}

function renderBarChart(){
  const el = document.getElementById('bar-chart');
  const total = subjects.reduce((a,s) => a + (s.totalSeconds||0), 0);
  if (!total){
    el.innerHTML = '<div class="graph-empty">Start a timer to see your progress here.</div>';
    return;
  }
  const max = Math.max(...subjects.map(s => s.totalSeconds||0), 1);
  el.innerHTML = subjects.filter(s => (s.totalSeconds||0) > 0).map(s => {
    const pct = Math.round((s.totalSeconds||0) / max * 100);
    return `<div class="bar-row">
      <div class="bar-label" title="${esc(s.name)}">${esc(s.name)}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${pct}%;background:${s.color}"></div>
      </div>
      <div class="bar-val">${fmtShort(s.totalSeconds||0)}</div>
    </div>`;
  }).join('') || '<div class="graph-empty">Start a timer to see your progress here.</div>';
}

function renderDonut(){
  const canvas = document.getElementById('donut-canvas');
  const ctx    = canvas.getContext('2d');
  const total  = subjects.reduce((a,s) => a + (s.totalSeconds||0), 0);
  const legend = document.getElementById('donut-legend');
  const totEl  = document.getElementById('graph-total');

  // total label
  const th = Math.floor(total / 3600);
  const tm = Math.floor((total % 3600) / 60);
  totEl.textContent = 'Total: ' + (th ? th+'h ' : '') + String(tm).padStart(2,'0')+'m';

  // clear canvas
  ctx.clearRect(0, 0, 160, 160);

  if (!total){
    ctx.beginPath();
    ctx.arc(80, 80, 60, 0, Math.PI*2);
    ctx.strokeStyle = '#2e2e3e';
    ctx.lineWidth = 18;
    ctx.stroke();
    legend.innerHTML = '';
    return;
  }

  // draw donut
  let angle = -Math.PI / 2;
  subjects.filter(s => (s.totalSeconds||0) > 0).forEach(s => {
    const slice = ((s.totalSeconds||0) / total) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(80, 80);
    ctx.arc(80, 80, 68, angle, angle + slice);
    ctx.closePath();
    ctx.fillStyle = s.color;
    ctx.fill();
    angle += slice;
  });

  // inner circle cutout
  ctx.beginPath();
  ctx.arc(80, 80, 46, 0, Math.PI*2);
  ctx.fillStyle = '#1a1a22';
  ctx.fill();

  // center text
  ctx.fillStyle = '#e8e8f0';
  ctx.font = '500 13px DM Mono, monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(subjects.filter(s=>(s.totalSeconds||0)>0).length + ' subj', 80, 80);

  // legend
  legend.innerHTML = subjects.filter(s => (s.totalSeconds||0) > 0).map(s => {
    const pct = Math.round((s.totalSeconds||0) / total * 100);
    return `<div class="legend-item">
      <div class="legend-dot" style="background:${s.color}"></div>
      <span>${esc(s.name.length > 12 ? s.name.slice(0,12)+'…' : s.name)} ${pct}%</span>
    </div>`;
  }).join('');
}

// ── ALARMS ────────────────────────────────────────────────────
let activeAlarmId = null, snoozeTO = null;

function renderAlarms(){
  const sorted=[...alarms].sort((a,b)=>a.time.localeCompare(b.time));
  const el=document.getElementById('alarm-list');
  if(!sorted.length){ el.innerHTML='<div style="text-align:center;color:var(--muted);padding:36px 0;font-size:13px;">No alarms set yet.</div>'; return; }
  el.innerHTML=sorted.map(a=>`<div class="alarm-item">
    <div class="alarm-time-big">${a.time}</div>
    <div class="alarm-info">
      <div class="alarm-label-text">${esc(a.label)}</div>
      <div class="alarm-days">${a.days}</div>
    </div>
    <label class="toggle-switch">
      <input type="checkbox" ${a.on?'checked':''} onchange="toggleAlarmOn('${a.id}',this.checked)">
      <span class="slider"></span>
    </label>
    <button class="del-btn" onclick="deleteAlarm('${a.id}')">×</button>
  </div>`).join('');
}

function toggleAlarmOn(id,val){ const a=alarms.find(x=>x.id===id); if(a){a.on=val;saveAlarms();} }
function deleteAlarm(id){ alarms=alarms.filter(x=>x.id!==id); saveAlarms(); renderAlarms(); }
function addAlarm(){
  const time=document.getElementById('alarm-time-input').value;
  const label=document.getElementById('alarm-label-input').value.trim()||'Study alarm';
  const days=document.getElementById('alarm-days-input').value;
  if(!time){ showToast('Pick a time'); return; }
  alarms.push({id:uid(),time,label,days,on:true}); saveAlarms();
  document.getElementById('alarm-time-input').value='';
  document.getElementById('alarm-label-input').value='';
  renderAlarms(); showToast('Alarm set for '+time);
  if(navigator.vibrate) navigator.vibrate(80);
}

// ── ALARM CHECK ───────────────────────────────────────────────
function checkAlarms(now){
  if(activeAlarmId) return;
  const hm=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  const isWeekend=now.getDay()===0||now.getDay()===6;
  alarms.forEach(a=>{
    if(!a.on||a.fired===hm||a.time!==hm) return;
    const ok=a.days==='Daily'||(a.days==='Mon–Fri'&&!isWeekend)||(a.days==='Weekends'&&isWeekend)||a.days==='Once';
    if(!ok) return;
    a.fired=hm; saveAlarms();
    triggerAlarm(a);
  });
}
function triggerAlarm(a){
  activeAlarmId=a.id;
  document.getElementById('ring-time').textContent=a.time;
  document.getElementById('ring-label').textContent=a.label;
  document.getElementById('alarm-overlay').classList.add('show');
  if(navigator.vibrate) navigator.vibrate([500,200,500,200,500,200,500]);
}
function dismissAlarm(){
  activeAlarmId=null;
  document.getElementById('alarm-overlay').classList.remove('show');
  if(snoozeTO) clearTimeout(snoozeTO);
}
function snoozeAlarm(){
  const id=activeAlarmId; dismissAlarm(); showToast('Snoozed — 5 minutes');
  snoozeTO=setTimeout(()=>{ const a=alarms.find(x=>x.id===id); if(a) triggerAlarm(a); },5*60*1000);
}

// ── CLOCK ─────────────────────────────────────────────────────
function updateClock(){
  const now=new Date();
  document.getElementById('clock').textContent=
    String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const mons=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('datestr').textContent=
    days[now.getDay()]+', '+now.getDate()+' '+mons[now.getMonth()]+' '+now.getFullYear();
  checkAlarms(now);
}
setInterval(updateClock,15000);
updateClock();

// ── TAB ───────────────────────────────────────────────────────
function showTab(name,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(btn) btn.classList.add('active');
  if(name==='graph') renderGraph();
}

// ── TOAST ─────────────────────────────────────────────────────
let toastTO;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTO);
  toastTO=setTimeout(()=>t.classList.remove('show'),2200);
}

// ── INIT ──────────────────────────────────────────────────────
renderSubjects();
renderAlarms();
renderGraph();

// ── SERVICE WORKER (PWA) ───────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.warn('SW failed:', err));
  });
}
